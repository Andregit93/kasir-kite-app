name: Deploy KasirKite to GCP VM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Remote Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ secrets.GCP_VM_PORT || 22 }}
          script_stop: true # Berhenti jika ada perintah yang gagal
          script: |
            if [ -f /var/www/kasir-app/deploy.sh ]; then
              chmod +x /var/www/kasir-app/deploy.sh
              /var/www/kasir-app/deploy.sh
            else
              echo "Error: /var/www/kasir-app/deploy.sh tidak ditemukan di server!"
              exit 1
            fi
