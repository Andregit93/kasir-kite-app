name: Deploy KasirKite to GCP VM

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build Assets & Deploy to Production
    runs-on: ubuntu-latest
    steps:
      # ──────────────────────────────────────────────
      # PHASE 1: Build aset frontend di GitHub Runner
      # ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Production Assets (Vite)
        run: npm run build

      # ──────────────────────────────────────────────
      # PHASE 2: Upload aset hasil build ke server VM
      # ──────────────────────────────────────────────
      - name: Deploy Built Assets to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          source: "public/build/*"
          target: "/var/www/kasir-app/"
          overwrite: true

      # ──────────────────────────────────────────────
      # PHASE 3: Deployment langsung via SSH
      # ──────────────────────────────────────────────
      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            cd /var/www/kasir-app

            echo "=== MEMULAI DEPLOYMENT ==="

            # 1. Maintenance mode
            php artisan down || true

            # 2. Tarik kode terbaru (force reset)
            git fetch origin master
            git reset --hard origin/master

            # 3. Composer (production)
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-dev --optimize-autoloader --no-interaction

            # 4. Migrasi database
            php artisan migrate --force

            # 5. Cache Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # 6. Restart Reverb jika ada
            if sudo supervisorctl status reverb-websocket > /dev/null 2>&1; then
              sudo supervisorctl restart reverb-websocket
              echo "✓ Reverb WebSocket di-restart"
            else
              echo "⚠ Reverb belum dikonfigurasi, dilewati"
            fi

            # 7. Fix ownership
            sudo chown -R deployer:www-data /var/www/kasir-app/public/build
            sudo chmod -R 775 /var/www/kasir-app/public/build

            # 8. Kembali online
            php artisan up

            echo "=== DEPLOYMENT BERHASIL ==="
